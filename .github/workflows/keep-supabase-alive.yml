name: Keep Supabase Alive

on:
  schedule:
    # S'exécute automatiquement tous les 2 jours à midi (UTC)
    - cron: '0 12 */2 * *'
  workflow_dispatch: # Permet aussi de lancer le script manuellement depuis GitHub

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Requête ping vers Supabase
        # ⚠️ IMPORTANT : Remplacez VOTRE_TABLE par le vrai nom d'une de vos tables (ex: dons, users, etc.)
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL_2 }}/rest/v1/absences?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY_2 }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY_2 }}"
